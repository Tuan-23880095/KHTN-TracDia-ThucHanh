<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập - Hệ thống Thực hành Trắc địa</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    
    </head>
<body class="bg-light">

    <main class="login-container">
        
        <header class="space-y-6 text-center py-8 px-4 w-full">
            
            <div class="flex items-center justify-center gap-4 sm:gap-6">
                
                <div class="h-12 sm:h-16 flex-shrink-0">
                    <img src="assets/img/logo-hcmus.png" 
                         alt="Logo Đại học Khoa học Tự nhiên" 
                         class="h-full w-auto object-contain">
                </div>
        
                <div class="flex flex-col justify-center space-y-1">
                    <h2 class="text-xs sm:text-base font-bold text-blue-800 tracking-widest uppercase leading-tight m-0">
                        Đại học Khoa học Tự nhiên - ĐHQG HCM
                    </h2>
                    <h2 class="text-sm sm:text-lg font-extrabold text-blue-600 tracking-widest uppercase leading-tight m-0">
                        Khoa Địa Chất
                    </h2>
                </div>
        
                <div class="h-12 sm:h-16 flex-shrink-0">
                    <img src="assets/img/logo-geology.png" 
                         alt="Logo Khoa Địa chất" 
                         class="h-full w-auto object-contain">
                </div>
            </div>
        
            <div class="space-y-4 pt-4">
                <h1 class="text-3xl sm:text-5xl font-extrabold text-gray-900 tracking-tight">
                    Hệ Thống Thực Hành <span class="gradient-text">Trắc Địa</span>
                </h1>
                <h3 class="text-sm font-bold text-gray-500 tracking-widest uppercase">
                    Học phần: GEO10055
                </h3>
            </div>
        </header>

        <section class="login-box">
            <form id="loginForm" novalidate>
                
                <div id="authErrorMessage" class="alert-error hidden" role="alert">
                    </div>

                <div class="form-group">
                    <label for="txtUserId">Mã số sinh viên (MSSV) / Giảng viên</label>
                    <input type="text" id="txtUserId" name="user_id" class="input-large" 
                           placeholder="Nhập MSSV của bạn" inputmode="numeric" required>
                </div>

                <div class="form-group">
                    <label for="txtPassword">Mật khẩu</label>
                    <input type="password" id="txtPassword" name="password" class="input-large" 
                           placeholder="Nhập mật khẩu" required>
                </div>

                <div class="form-actions">
                    <button type="submit" id="btnLogin" class="btn-primary btn-block btn-large">
                        <span id="btnLoginText">ĐĂNG NHẬP HỆ THỐNG</span>
                        <span id="btnLoginSpinner" class="loader hidden"></span>
                    </button>
                </div>
                
            </form>
        </section>

        <footer class="login-footer">
            <p>Hệ thống Hỗ trợ Thực địa v1.0 &copy; 2025</p>
        </footer>

    </main>

    <script type="module" src="js/core/APIConnector.js"></script>
    <script type="module" src="js/core/UserAuth.js"></script>
    <script type="module" src="js/controllers/authCtrl.js"></script>

</body>
</html>
