<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng ký Tài khoản - Hệ thống Thực hành Trắc địa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #059669, #0ea5e9); /* Đổi gradient sang tông Xanh lá - Xanh ngọc cho trang Đăng ký */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 py-8">

    <main class="max-w-md w-full space-y-6 bg-white p-6 sm:p-10 rounded-3xl shadow-xl border border-gray-100 transition-all hover:shadow-2xl card-anti-glare">
        
        <header class="space-y-4 text-center">
            <div class="flex items-center justify-center gap-3 sm:gap-4">
                <div class="h-10 sm:h-12 flex-shrink-0">
                    <img src="https://geology.hcmus.edu.vn/wp-content/uploads/2023/11/Logo-HCMUS-300x246.jpg" 
                         alt="HCMUS" class="h-full w-auto object-contain"
                         onerror="this.src='assets/img/logo-hcmus.png'">
                </div>
                <div class="flex flex-col justify-center text-left">
                    <h2 class="text-[10px] sm:text-xs font-bold text-emerald-600 tracking-wider uppercase leading-tight m-0">
                        ĐH Khoa học Tự nhiên - ĐHQG HCM
                    </h2>
                    <h2 class="text-xs sm:text-sm font-extrabold text-emerald-800 tracking-wide uppercase leading-tight m-0">
                        Khoa Địa Chất
                    </h2>
                </div>
                <div class="h-10 sm:h-12 flex-shrink-0">
                    <img src="https://geology.hcmus.edu.vn/wp-content/uploads/2023/11/Geology-50PNG-300x300.png" 
                         alt="Geology" class="h-full w-auto object-contain"
                         onerror="this.src='assets/img/logo-geology.png'">
                </div>
            </div>
        
            <div class="space-y-1 pt-2">
                <h1 class="text-2xl sm:text-3xl font-black text-gray-900 tracking-tight">
                    Tạo Tài Khoản <span class="gradient-text">Mới</span>
                </h1>
                <p class="text-xs text-gray-400 font-medium">Vui lòng sử dụng MSSV chính xác để Giảng viên chấm điểm</p>
            </div>
        </header>

        <form id="registerForm" class="space-y-4" novalidate>
            
            <div id="registerErrorMessage" class="hidden" role="alert"></div>

            <div class="space-y-1">
                <label for="txtFullName" class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wider block">
                    Họ và tên đầy đủ <span class="text-red-500">*</span>
                </label>
                <input type="text" id="txtFullName" name="full_name" class="input-field" placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label for="txtUserId" class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wider block">
                        MSSV <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="txtUserId" name="user_id" class="input-field" placeholder="VD: 22110001" inputmode="numeric" required>
                </div>
                <div class="space-y-1">
                    <label for="txtGroupId" class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wider block">
                        Nhóm thực địa
                    </label>
                    <input type="text" id="txtGroupId" name="group_id" class="input-field" placeholder="VD: N01">
                </div>
            </div>

            <div class="space-y-1">
                <label for="txtRegPassword" class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wider block">
                    Mật khẩu <span class="text-red-500">*</span>
                </label>
                <input type="password" id="txtRegPassword" name="password" class="input-field" placeholder="Tạo mật khẩu dễ nhớ" required>
            </div>

            <div class="space-y-1">
                <label for="txtConfirmPassword" class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wider block">
                    Xác nhận Mật khẩu <span class="text-red-500">*</span>
                </label>
                <input type="password" id="txtConfirmPassword" name="confirm_password" class="input-field" placeholder="Nhập lại mật khẩu" required>
            </div>

            <div class="pt-4">
                <button type="submit" id="btnRegister" class="btn w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white shadow-md">
                    <span>ĐĂNG KÝ TÀI KHOẢN</span>
                    <span id="btnRegisterSpinner" class="spinner hidden"></span>
                </button>
            </div>
        </form>

        <p class="text-center text-xs text-gray-500 font-medium pt-2">
            Đã có tài khoản? 
            <a href="index.html" class="text-emerald-600 font-bold hover:underline">Quay lại Đăng nhập</a>
        </p>
    </main>

    <script type="module" src="js/controllers/registerCtrl.js"></script>

</body>
</html>
